version: '3.6'

services:
  nginx:
    container_name: ${DOCKER_PROJECT}_nginx
    image: nginx:1.15.1-alpine
    ports:
      - ${DOCKER_NGINX_PORT}:80
    volumes:
      - type: bind
        source: ./docker/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      - type: bind
        source: ./docker/localhost.crt
        target: /etc/nginx/ssl/localhost.crt
        read_only: true
      - type: bind
        source: ./docker/localhost.key
        target: /etc/nginx/ssl/localhost.key
        read_only: true
      - ./:/var/www/html # add :cached if on Mac OS
    depends_on:
      - fpm
    networks:
      - netw

  fpm:
    container_name: ${DOCKER_PROJECT}_php
    build:
      context: ./
      dockerfile: ./docker/fpm.Dockerfile
    environment:
      XDEBUG_CONFIG: client_host=${XDEBUG_REMOTE_HOST}
      PHP_IDE_CONFIG: serverName=localhost
    volumes:
      - ./:/var/www/html # add :cached if on Mac OS
      - ./../repos:/var/www/html/repositories # add :cached if on Mac OS
      - ~/.composer:/.composer
      - ./docker/.ssh:/home/origamiv/.ssh
    mem_reservation: 4g
    mem_limit: 4g
    ports:
        - 9000:9000
    depends_on:
      - db
      - redis
    user: ${UID}
    networks:
      - netw

  db:
    container_name: ${DOCKER_PROJECT}_db
    image: postgis/postgis:13-3.3
    user: root
    working_dir: /var/www/application
    volumes:
        - ./:/var/www/application
        - ./docker/db:/var/lib/postgresql/data
        - ./database/init:/docker-entrypoint-initdb.d
    environment:
        - POSTGRES_USER=${DB_USERNAME}
        - POSTGRES_PASSWORD=${DB_PASSWORD}
        - POSTGRES_DB=${DB_DATABASE}
        - PGDATA=/tmp
    ports:
        - "${DOCKER_POSTGRES_EXTERNAL_PORT}:5432"
    restart: always
    networks:
        - netw

  clickhouse:
    container_name: ${DOCKER_PROJECT}_clickhouse
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"   # HTTP интерфейс
      - "9009:9000"   # Native TCP (если нужен клиент/драйвер)
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    networks:
      - netw

  mailcatcher:
    container_name: ${DOCKER_PROJECT}_mail
    image: schickling/mailcatcher:latest
    ports:
      - 1080:1080
    networks:
      - netw

  redis:
    container_name: ${DOCKER_PROJECT}_redis
    image: redis:5.0-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis:/data
    networks:
      - netw

  adminer:
    container_name: ${DOCKER_PROJECT}_adminer
    image: adminer
    ports:
      - 8090:8080
    networks:
      - netw

  tabix:
    container_name: ${DOCKER_PROJECT}_tabix
    image: spoonest/clickhouse-tabix-web-client
    ports:
      - 8091:80
    depends_on:
      - clickhouse
    networks:
      - netw

  rabbitmq:
    container_name: ${DOCKER_PROJECT}_rabbit
    image: rabbitmq:3.10.7-management
    ports:
      - 15672:15672
    networks:
      - netw

  dozzle:
    container_name: ${DOCKER_PROJECT}_dozzle
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 9999:8080
    networks:
      - netw

  minio:
    container_name: ${DOCKER_PROJECT}_minio
    image: quay.io/minio/minio
    command: server /data --console-address :9001
    ports:
      - "9005:9000"
      - "9006:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
      MINIO_BUCKETS: ${AWS_BUCKET}
    volumes:
      - minio_data:/data
    networks:
      - netw

networks:
  netw:

volumes:
  db:
  redis:
  minio_data:
  clickhouse_data:
